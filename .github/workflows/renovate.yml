name: Renovate Central Bot

on:
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Renovate
        uses: renovatebot/github-action@v46.1.18
        with:
          configurationFile: config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          # Force verbose output so you see every network lookup
          LOG_LEVEL: "info"
          # Instruct Node to utilize up to 4GB RAM to process heavy Maven parsing safely
          NODE_OPTIONS: "--max-old-space-size=4096 --trace-warnings"


